name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build library
        run: ./gradlew clean :sslpinning:assembleRelease

      - name: Build sample (integration check)
        run: ./gradlew :app:assembleDebug
